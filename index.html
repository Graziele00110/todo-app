<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Lista de Tarefas</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Minhas Tarefas</h1>

  <input type="text" id="tarefa" placeholder="Digite uma tarefa">
  <button onclick="adicionarTarefa()">Adicionar</button>

  <div class="filtros">
    <button onclick="filtrar('todas')">Todas</button>
    <button onclick="filtrar('pendentes')">Pendentes</button>
    <button onclick="filtrar('concluidas')">Concluídas</button>
  </div>

  <p id="contador"></p>

  <button onclick="limparConcluidas()">Limpar concluídas</button>

  <div id="mensagem" class="mensagem"></div>

  <ul id="lista"></ul>
</div>

<script src="script.js"></script>
</body>
</html>
